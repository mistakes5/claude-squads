<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Gradient for the background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1B26"/>
      <stop offset="100%" style="stop-color:#24283B"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background: rounded square -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#C0CAF5" stroke-width="1">
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
  </g>

  <!-- ═══ CLAWD 1 (center-front, biggest, the "leader") ═══ -->
  <g transform="translate(512, 520)" filter="url(#shadow)">
    <!-- Body: the classic Clawd starburst shape -->
    <g transform="scale(1.35)">
      <!-- Main starburst body -->
      <path d="
        M 0,-120
        C 20,-100 35,-50 30,-30
        C 55,-45 100,-60 110,-40
        C 95,-15 55,5 35,10
        C 55,25 90,55 85,75
        C 65,65 30,45 15,35
        C 15,60 10,105 -5,110
        C -15,90 -20,50 -18,30
        C -40,50 -80,75 -90,65
        C -80,40 -50,15 -35,5
        C -60,-5 -105,-15 -110,-35
        C -90,-45 -50,-40 -30,-30
        C -40,-55 -30,-100 -10,-115
        Z
      " fill="#C15F3C"/>
      <!-- Face -->
      <circle cx="-18" cy="-12" r="8" fill="#1A1B26"/>
      <circle cx="18" cy="-12" r="8" fill="#1A1B26"/>
      <circle cx="-15" cy="-14" r="3" fill="#C0CAF5"/>
      <circle cx="21" cy="-14" r="3" fill="#C0CAF5"/>
      <!-- Smile -->
      <path d="M -12,8 Q 0,22 12,8" stroke="#1A1B26" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>
    <!-- Leader crown/hat: tiny code brackets -->
    <g transform="translate(0, -190)">
      <text x="0" y="0" text-anchor="middle" font-family="monospace" font-size="48" font-weight="bold" fill="#9ECE6A" opacity="0.9">{SC}</text>
    </g>
  </g>

  <!-- ═══ CLAWD 2 (back-left, smaller, wearing headphones) ═══ -->
  <g transform="translate(260, 380)" filter="url(#shadow)">
    <g transform="scale(0.9)">
      <!-- Starburst body -->
      <path d="
        M 0,-120
        C 20,-100 35,-50 30,-30
        C 55,-45 100,-60 110,-40
        C 95,-15 55,5 35,10
        C 55,25 90,55 85,75
        C 65,65 30,45 15,35
        C 15,60 10,105 -5,110
        C -15,90 -20,50 -18,30
        C -40,50 -80,75 -90,65
        C -80,40 -50,15 -35,5
        C -60,-5 -105,-15 -110,-35
        C -90,-45 -50,-40 -30,-30
        C -40,-55 -30,-100 -10,-115
        Z
      " fill="#DE7356"/>
      <!-- Face -->
      <circle cx="-18" cy="-12" r="8" fill="#1A1B26"/>
      <circle cx="18" cy="-12" r="8" fill="#1A1B26"/>
      <circle cx="-15" cy="-14" r="3" fill="#C0CAF5"/>
      <circle cx="21" cy="-14" r="3" fill="#C0CAF5"/>
      <!-- Happy closed eyes (this one is vibing) -->
      <path d="M -12,8 Q 0,20 12,8" stroke="#1A1B26" stroke-width="4" fill="none" stroke-linecap="round"/>
      <!-- Headphones -->
      <path d="M -45,-30 C -50,-75 50,-75 45,-30" stroke="#7982A9" stroke-width="6" fill="none" stroke-linecap="round"/>
      <rect x="-52" y="-38" width="16" height="22" rx="5" fill="#7982A9"/>
      <rect x="36" y="-38" width="16" height="22" rx="5" fill="#7982A9"/>
    </g>
  </g>

  <!-- ═══ CLAWD 3 (back-right, smaller, wearing sunglasses) ═══ -->
  <g transform="translate(764, 380)" filter="url(#shadow)">
    <g transform="scale(0.9)">
      <!-- Starburst body -->
      <path d="
        M 0,-120
        C 20,-100 35,-50 30,-30
        C 55,-45 100,-60 110,-40
        C 95,-15 55,5 35,10
        C 55,25 90,55 85,75
        C 65,65 30,45 15,35
        C 15,60 10,105 -5,110
        C -15,90 -20,50 -18,30
        C -40,50 -80,75 -90,65
        C -80,40 -50,15 -35,5
        C -60,-5 -105,-15 -110,-35
        C -90,-45 -50,-40 -30,-30
        C -40,-55 -30,-100 -10,-115
        Z
      " fill="#E8956A"/>
      <!-- Sunglasses instead of eyes -->
      <rect x="-32" y="-24" width="26" height="18" rx="4" fill="#1A1B26"/>
      <rect x="6" y="-24" width="26" height="18" rx="4" fill="#1A1B26"/>
      <line x1="-6" y1="-15" x2="6" y2="-15" stroke="#1A1B26" stroke-width="3"/>
      <!-- Lens shine -->
      <rect x="-28" y="-22" width="6" height="4" rx="2" fill="#565F89" opacity="0.5"/>
      <rect x="10" y="-22" width="6" height="4" rx="2" fill="#565F89" opacity="0.5"/>
      <!-- Smirk -->
      <path d="M -5,10 Q 8,20 18,12" stroke="#1A1B26" stroke-width="4" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ═══ CLAWD 4 (peeking from bottom-left, tiny) ═══ -->
  <g transform="translate(340, 680)" filter="url(#shadow)">
    <g transform="scale(0.65)">
      <path d="
        M 0,-120
        C 20,-100 35,-50 30,-30
        C 55,-45 100,-60 110,-40
        C 95,-15 55,5 35,10
        C 55,25 90,55 85,75
        C 65,65 30,45 15,35
        C 15,60 10,105 -5,110
        C -15,90 -20,50 -18,30
        C -40,50 -80,75 -90,65
        C -80,40 -50,15 -35,5
        C -60,-5 -105,-15 -110,-35
        C -90,-45 -50,-40 -30,-30
        C -40,-55 -30,-100 -10,-115
        Z
      " fill="#D4845E"/>
      <!-- Big round eyes (the excited one) -->
      <circle cx="-18" cy="-12" r="10" fill="#1A1B26"/>
      <circle cx="18" cy="-12" r="10" fill="#1A1B26"/>
      <circle cx="-14" cy="-15" r="4.5" fill="#C0CAF5"/>
      <circle cx="22" cy="-15" r="4.5" fill="#C0CAF5"/>
      <!-- Open mouth (excited) -->
      <ellipse cx="0" cy="15" rx="10" ry="8" fill="#1A1B26"/>
    </g>
  </g>

  <!-- ═══ CLAWD 5 (peeking from bottom-right, tiny, sleeping) ═══ -->
  <g transform="translate(684, 680)" filter="url(#shadow)">
    <g transform="scale(0.65)">
      <path d="
        M 0,-120
        C 20,-100 35,-50 30,-30
        C 55,-45 100,-60 110,-40
        C 95,-15 55,5 35,10
        C 55,25 90,55 85,75
        C 65,65 30,45 15,35
        C 15,60 10,105 -5,110
        C -15,90 -20,50 -18,30
        C -40,50 -80,75 -90,65
        C -80,40 -50,15 -35,5
        C -60,-5 -105,-15 -110,-35
        C -90,-45 -50,-40 -30,-30
        C -40,-55 -30,-100 -10,-115
        Z
      " fill="#B8705A"/>
      <!-- Sleepy eyes (closed lines) -->
      <path d="M -28,-14 Q -18,-6 -8,-14" stroke="#1A1B26" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M 8,-14 Q 18,-6 28,-14" stroke="#1A1B26" stroke-width="4" fill="none" stroke-linecap="round"/>
      <!-- Zzz -->
      <text x="45" y="-40" font-family="monospace" font-size="28" font-weight="bold" fill="#565F89" opacity="0.7">z</text>
      <text x="60" y="-60" font-family="monospace" font-size="22" font-weight="bold" fill="#565F89" opacity="0.5">z</text>
      <!-- Peaceful smile -->
      <path d="M -8,8 Q 0,16 8,8" stroke="#1A1B26" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- Sparkle particles around the squad -->
  <g fill="#C15F3C" opacity="0.4">
    <circle cx="150" cy="200" r="4"/>
    <circle cx="880" cy="240" r="3"/>
    <circle cx="120" cy="600" r="3"/>
    <circle cx="900" cy="580" r="4"/>
    <circle cx="512" cy="150" r="3"/>
    <circle cx="200" cy="850" r="3"/>
    <circle cx="824" cy="850" r="3"/>
  </g>

  <!-- Small terminal cursor blink at bottom -->
  <g transform="translate(512, 900)" opacity="0.3">
    <rect x="-60" y="-12" width="120" height="2" rx="1" fill="#565F89"/>
    <rect x="-8" y="-18" width="16" height="14" rx="2" fill="#C15F3C">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
