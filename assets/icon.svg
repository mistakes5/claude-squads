<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1B26"/>
      <stop offset="100%" style="stop-color:#24283B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.035" stroke="#C0CAF5" stroke-width="1">
    <line x1="0" y1="341" x2="1024" y2="341"/>
    <line x1="0" y1="682" x2="1024" y2="682"/>
    <line x1="341" y1="0" x2="341" y2="1024"/>
    <line x1="682" y1="0" x2="682" y2="1024"/>
  </g>

  <!-- ═══ BACK-LEFT GUY (smaller, behind) ═══ -->
  <g transform="translate(195, 340) scale(0.72)">
    <!-- Ears -->
    <rect x="30" y="0" width="60" height="50" rx="4" fill="#E8956A"/>
    <rect x="270" y="0" width="60" height="50" rx="4" fill="#E8956A"/>
    <!-- Head/body -->
    <rect x="0" y="35" width="360" height="280" rx="12" fill="#E8956A"/>
    <!-- Eyes -->
    <rect x="70" y="110" width="55" height="55" rx="6" fill="#1A1B26"/>
    <rect x="230" y="110" width="55" height="55" rx="6" fill="#1A1B26"/>
    <!-- Eye shine -->
    <rect x="78" y="118" width="18" height="18" rx="3" fill="#E8956A" opacity="0.35"/>
    <rect x="238" y="118" width="18" height="18" rx="3" fill="#E8956A" opacity="0.35"/>
    <!-- Legs -->
    <rect x="40" y="295" width="90" height="100" rx="6" fill="#E8956A"/>
    <rect x="230" y="295" width="90" height="100" rx="6" fill="#E8956A"/>
  </g>

  <!-- ═══ BACK-RIGHT GUY (smaller, behind) ═══ -->
  <g transform="translate(570, 310) scale(0.72)">
    <!-- Ears -->
    <rect x="30" y="0" width="60" height="50" rx="4" fill="#DE7356"/>
    <rect x="270" y="0" width="60" height="50" rx="4" fill="#DE7356"/>
    <!-- Head/body -->
    <rect x="0" y="35" width="360" height="280" rx="12" fill="#DE7356"/>
    <!-- Eyes -->
    <rect x="70" y="110" width="55" height="55" rx="6" fill="#1A1B26"/>
    <rect x="230" y="110" width="55" height="55" rx="6" fill="#1A1B26"/>
    <!-- Eye shine -->
    <rect x="78" y="118" width="18" height="18" rx="3" fill="#DE7356" opacity="0.35"/>
    <rect x="238" y="118" width="18" height="18" rx="3" fill="#DE7356" opacity="0.35"/>
    <!-- Legs -->
    <rect x="40" y="295" width="90" height="100" rx="6" fill="#DE7356"/>
    <rect x="230" y="295" width="90" height="100" rx="6" fill="#DE7356"/>
  </g>

  <!-- ═══ FRONT-CENTER GUY (hero, biggest) ═══ -->
  <g transform="translate(230, 380)">
    <!-- Ears -->
    <rect x="40" y="0" width="80" height="65" rx="6" fill="#C15F3C"/>
    <rect x="440" y="0" width="80" height="65" rx="6" fill="#C15F3C"/>
    <!-- Head/body -->
    <rect x="0" y="45" width="560" height="370" rx="16" fill="#C15F3C"/>
    <!-- Eyes -->
    <rect x="105" y="155" width="80" height="80" rx="8" fill="#1A1B26"/>
    <rect x="370" y="155" width="80" height="80" rx="8" fill="#1A1B26"/>
    <!-- Eye shine -->
    <rect x="115" y="165" width="26" height="26" rx="4" fill="#F4F3EE" opacity="0.3"/>
    <rect x="380" y="165" width="26" height="26" rx="4" fill="#F4F3EE" opacity="0.3"/>
    <!-- Legs -->
    <rect x="65" y="390" width="130" height="140" rx="8" fill="#C15F3C"/>
    <rect x="365" y="390" width="130" height="140" rx="8" fill="#C15F3C"/>
  </g>
</svg>
